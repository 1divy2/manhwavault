name: Supabase Keepalive Ping

on:
  schedule:
    # Runs at 00:00 every 5 days to prevent the 7-day inactivity pause on Supabase free tier
    - cron: '0 0 */5 * *'
  workflow_dispatch: # Allows you to manually trigger the ping from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase to keep it awake..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "https://zhzbllptnbkhobnszsso.supabase.co/rest/v1/manhwa_entries?select=id&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoemJsbHB0bmJraG9ibnN6c3NvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMjkxODksImV4cCI6MjA5NTcwNTE4OX0.hDzrRLeyDuMqJE0C_tdIOVe8dSQGiREMYeBMg2f8kNI" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoemJsbHB0bmJraG9ibnN6c3NvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMjkxODksImV4cCI6MjA5NTcwNTE4OX0.hDzrRLeyDuMqJE0C_tdIOVe8dSQGiREMYeBMg2f8kNI")
          
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 401 ]; then
            echo "Ping successful! (Status: $RESPONSE)"
          else
            echo "Ping failed with status: $RESPONSE"
            exit 1
          fi
